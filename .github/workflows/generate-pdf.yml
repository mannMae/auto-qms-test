name: Generate QMS PDF

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ closed ]
    branches: [ main ]

jobs:
  build:
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install chromium

    - name: Generate PDF (Selective Update)
      run: node scripts/ci-selective-update.js

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Commit and Push Drafts
      run: |
        git config user.name "Antigravity AI"
        git config user.email "antigravity@example.com"
        git add templates/DRAFT_*.md docs/*_content.md
        # 변경 사항이 있을 때만 커밋 수행
        if ! git diff --cached --quiet; then
          git commit -m "Auto-generate draft templates from new references"
          git push origin main
        else
          echo "No new drafts or changes to commit."
        fi

    - name: Create Release and Upload PDF
      uses: softprops/action-gh-release@v1
      with:
        files: output/*.pdf
        tag_name: latest
        name: "Latest QMS Documents (${{ steps.date.outputs.date }})"
        body: "CI/CD를 통해 자동으로 생성된 최신 QMS 공식 문서입니다."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
