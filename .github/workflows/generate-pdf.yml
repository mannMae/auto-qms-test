name: Generate QMS PDF

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ closed ]
    branches: [ main ]

jobs:
  build:
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install chromium

    - name: Generate PDF (Selective Update)
      run: node scripts/ci-selective-update.js

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Commit and Push Drafts
      run: |
        git config user.name "Antigravity AI"
        git config user.email "antigravity@example.com"
        
        # 새로운 초안 파일, 컨텐츠 소스, 그리고 업데이트된 버전 정보(versions.json)를 stage
        git add templates/DRAFT_*.md docs/*_content.md docs/versions.json 2>/dev/null || echo "No changes to stage."
        
        # 스테이징된 변경 사항이 있을 때만 커밋 및 푸시 수행
        if ! git diff --cached --quiet; then
          git commit -m "Auto-generate draft templates or update versions [skip ci]"
          # 다른 커밋과 충돌나지 않도록 리베이스 후 푸시
          git pull origin main --rebase
          git push origin main
        else
          echo "Nothing to commit. Skipping git push."
        fi

    - name: Create Release and Upload PDF
      uses: softprops/action-gh-release@v1
      with:
        files: output/*.pdf
        tag_name: latest
        name: "Latest QMS Documents (${{ steps.date.outputs.date }})"
        body: "CI/CD를 통해 자동으로 생성된 최신 QMS 공식 문서입니다."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
