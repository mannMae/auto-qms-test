name: Generate QMS PDF

on:
  push:
    branches: [ main, "test/**", "feature/**" ]
  pull_request:
    types: [ closed ]
    branches: [ main ]

jobs:
  build:
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install chromium

    - name: Generate PDF (Selective Update)
      run: node scripts/ci-selective-update.js

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Commit and Push Metadata
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "Antigravity AI"
        git config user.email "antigravity@example.com"
        
        echo "--- Current versions.json state ---"
        cat docs/versions.json || echo "No versions.json found"
        
        git add docs/versions.json
        # Check if files exist before adding to avoid fatal pathspec errors
        ls templates/DRAFT_*.md >/dev/null 2>&1 && git add templates/DRAFT_*.md || echo "No draft templates to add"
        ls docs/*_content.md >/dev/null 2>&1 && git add docs/*_content.md || echo "No content documents to add"
        
        if ! git diff --cached --quiet; then
          echo "Changes detected. Committing..."
          git commit -m "Auto-update QMS metadata [skip ci]"
          
          echo "Attempting to push back to: ${{ github.ref_name }}"
          # Fetch and rebase to avoid conflicts
          git pull origin ${{ github.ref_name }} --rebase
          git push origin HEAD:${{ github.ref_name }}
          
          echo "--- Resulting versions.json state ---"
          cat docs/versions.json
        else
          echo "No changes to commit. Skipping push."
        fi

    - name: Create Release and Upload PDF
      uses: softprops/action-gh-release@v1
      with:
        files: output/*.pdf
        tag_name: latest
        name: "Latest QMS Documents (${{ steps.date.outputs.date }})"
        body: "CI/CD를 통해 자동으로 생성된 최신 QMS 공식 문서입니다."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
